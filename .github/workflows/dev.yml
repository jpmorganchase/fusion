name: Build and Test

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_HTTP_TIMEOUT: 300
  PIP_DISABLE_PIP_VERSION_CHECK: 1

jobs:
  sdist-wheel-tests:
    strategy:
      fail-fast: true
      matrix:
        python-versions: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    name: sdist/wheel and tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-versions }}
        run: uv python install ${{ matrix.python-versions }}

      - name: Install the project (dev + all extras)
        run: uv sync --all-extras --dev

      # required for mike doc deploy inside tox
      - name: Setup doc deploy git user
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Get Python Info
        id: get-python-info
        run: |
          uv run python -c "import platform; print(f'{platform.python_version()}')" > python_info.txt
          ls -l "$(readlink "$(uv run which python)")"

      - name: Set python native lib path
        id: set-env-var
        run: |
          PYTHON_INFO=$(cat python_info.txt)
          FULL_PYTHON_LIB_PATH=$(eval echo $HOME/.local/share/uv/python/cpython-$PYTHON_INFO*/lib)
          echo "PYTHON_INFO=$PYTHON_INFO" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=${FULL_PYTHON_LIB_PATH}:\$LD_LIBRARY_PATH" >> $GITHUB_ENV

      - name: Debug env
        run: |
          echo "LD_LIBRARY_PATH: $LD_LIBRARY_PATH"
          echo "PYTHON_INFO: $PYTHON_INFO"

      - name: Run tox (lint + docs)
        run: |
          uv python pin ${{ matrix.python-versions }}
          uv run tox -e lint,doc

      # Build both sdist and wheel via setuptools
      - name: Build sdist & wheel (setuptools)
        run: uv build --sdist --wheel
        shell: bash

      # Smoke integ tests against the built wheel(s)
      - name: Integration test artifacts (install wheel)
        run: |
          ls -l dist
          rm -rf .venv
          for pkg in dist/*.whl; do
            echo "Testing wheel: $pkg"
            uv venv
            uv pip install "$pkg" pytest pytest-random-order --force-reinstall
            .venv/bin/pytest -v py_integ -s
          done
        env:
          FUSION_CLIENT_ID: ${{ secrets.FUSION_CLIENT_ID }}
          FUSION_CLIENT_SECRET: ${{ secrets.FUSION_CLIENT_SECRET }}
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-py${{ matrix.python-versions }}
          path: |
            dist/*.tar.gz
            dist/*.whl

  artifact-check:
    needs: [sdist-wheel-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          path: dist
          merge-multiple: true

      - name: List dist files
        run: ls -l dist
