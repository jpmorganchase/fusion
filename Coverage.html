<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coverage Reports</title>
    <!-- Bootstrap CSS -->
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f8f9fa;
        }
        h1 {
            text-align: center;
            margin-bottom: 40px;
            font-family: 'Shadows Into Light', cursive;
            color: #fff;
            background-color: #007bff;
            padding: 20px;
            border-radius: 10px;
            font-size: 3rem;
            box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }
        .card {
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .card:hover {
            transform: scale(1.05);
        }
        .card-icon {
            font-size: 3rem;
            color: #007bff;
        }
        .container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }
        .card-body {
            text-align: center;
        }
        .card-body a {
            text-decoration: none;
            color: #fff;
        }
        .btn-primary {
            background-color: #007bff;
            border-color: #007bff;
        }
        .btn-primary:hover {
            background-color: #0056b3;
            border-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Coverage Reports</h1>
    <div class="container">
        <div class="card mr-3 mb-3" style="width: 18rem;">
            <div class="card-body">
                <i class="fab fa-python card-icon"></i>
                <h5 class="card-title mt-3">Python Coverage</h5>
                <p class="card-text">Detailed coverage report for Python code.</p>
                <a href=".reports/py/index.html" class="btn btn-primary">View Report</a>
            </div>
        </div>
        <div class="card mr-3 mb-3" style="width: 18rem;">
            <div class="card-body">
                <i class="fab fa-rust card-icon"></i>
                <h5 class="card-title mt-3">Rust Coverage</h5>
                <p class="card-text">Detailed coverage report for Rust code.</p>
                <a href=".reports/rust/html/index.html" class="btn btn-primary">View Report</a>
            </div>
        </div>
        <div class="card mb-3" style="width: 18rem;">
            <div class="card-body">
                <i class="fas fa-chart-line card-icon"></i>
                <h5 class="card-title mt-3">Pytest Benchmark</h5>
                <p class="card-text">Performance benchmark results for Python tests.</p>
                <a href=".reports/py/py_bench.html" class="btn btn-primary">View Report</a>
            </div>
        </div>
    </div>
    <!-- Bootstrap JS and dependencies -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
